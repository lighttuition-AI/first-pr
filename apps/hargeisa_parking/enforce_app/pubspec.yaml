name: hpark_enforce
description: "HPark Enforce — Hargeisa Parking officer app (registration, approval gate, patrol & citations)."
publish_to: 'none'
version: 1.1.0+10

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  image_picker: ^1.1.2
  google_mlkit_text_recognition: ^0.13.0
  firebase_core: ^4.10.0
  hpark_core:
    path: ../packages/hpark_core
  hpark_firebase:
    path: ../packages/hpark_firebase

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

# App-store / Play-store icon — the HPark gradient "P" + a purple shield (officer).
# Regenerate the masters with `flutter test tool/gen_icons.dart`, then
# `dart run flutter_launcher_icons`.
flutter_launcher_icons:
  image_path: "assets/launcher/icon.png"
  android: true
  ios: true
  remove_alpha_ios: true
  adaptive_icon_background: "#0F0F17"
  adaptive_icon_foreground: "assets/launcher/icon_fg.png"

flutter:
  uses-material-design: true
