publish_to: 'none'
version: 1.1.0+13

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  file_picker: ^11.0.2
