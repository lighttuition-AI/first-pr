name: hpark_pay
description: "HPark Pay — Hargeisa Parking citizen app (citations, ZAAD/eDahab payments, district deals)."
publish_to: 'none'
version: 1.1.0+11

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  qr_flutter: ^4.1.0
  shared_preferences: ^2.3.2
  firebase_core: ^4.10.0
  cloud_firestore: ^6.5.0
  hpark_core:
    path: ../packages/hpark_core
  hpark_firebase:
    path: ../packages/hpark_firebase

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

# App-store / Play-store icon — white background + the HPark gradient "P" (matches the Command dashboard).
# Regenerate the masters with `flutter test tool/gen_icons.dart` (in enforce_app),
# then `dart run flutter_launcher_icons`.
flutter_launcher_icons:
  image_path: "assets/launcher/icon.png"
  android: true
  ios: true
  remove_alpha_ios: true
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/launcher/icon_fg.png"

flutter:
  uses-material-design: true
